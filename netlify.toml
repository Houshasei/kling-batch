[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Include native deps that esbuild sometimes drops
  included_files = ["node_modules/formidable/**"]

# /api/piapi → function (the function also declares this path, this is belt + suspenders)
[[redirects]]
  from = "/api/piapi"
  to = "/.netlify/functions/piapi"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
