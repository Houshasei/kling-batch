# Auto-builds and deploys the SPA to GitHub Pages on every push to main.
#
# IMPORTANT: GitHub Pages is STATIC ONLY. You MUST point the SPA at an
# external backend by setting the `VITE_API_BASE` repo secret to a URL
# that hosts the /api/piapi endpoint, e.g. https://your-app.vercel.app
# or https://your-app.netlify.app.
#
# If VITE_API_BASE is unset, the SPA will try same-origin /api/piapi and
# every backend call will 404.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build for GitHub Pages
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
